version: "3.9"

services:
  # ─── Core Backend ─────────────────────────────────────────
  axiom_api:
    build: .
    ports: ["8000:8000"]
    depends_on: [redis, kafka, postgres, qdrant, minio]
    environment:
      - REDIS_URL=redis://redis:6379
      - KAFKA_BOOTSTRAP=kafka:9092
      - DATABASE_URL=postgresql://axiom:axiom@postgres:5432/axiom
      - QDRANT_URL=http://qdrant:6333
      - MINIO_URL=http://minio:9000
      - PAPER_TRADING=true

  # ─── Frontend ─────────────────────────────────────────────
  axiom_ui:
    build: ./ui
    ports: ["3000:3000"]
    depends_on: [axiom_api]

  # ─── Real-Time Cache ──────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru

  # ─── Event Streaming ──────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on: [zookeeper]
    ports: ["9092:9092"]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  # ─── Time-Series Database ─────────────────────────────────
  postgres:
    image: timescale/timescaledb:latest-pg15
    ports: ["5432:5432"]
    environment:
      POSTGRES_DB: axiom
      POSTGRES_USER: axiom
      POSTGRES_PASSWORD: axiom
    volumes:
      - pgdata:/var/lib/postgresql/data

  # ─── OSS Vector DB (Qdrant) ───────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    ports: ["6333:6333", "6334:6334"]
    volumes:
      - qdrant_data:/qdrant/storage

  # ─── OSS Object Storage (MinIO) ───────────────────────────
  minio:
    image: minio/minio:latest
    ports: ["9000:9000", "9001:9001"]
    environment:
      MINIO_ROOT_USER: axiom_admin
      MINIO_ROOT_PASSWORD: axiom_password
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  # ─── Local LLM ────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    ports: ["11434:11434"]
    volumes:
      - ollama_data:/root/.ollama
    restart: always

  # ─── Fast Headless Browser ────────────────────────────────
  lightpanda:
    image: ghcr.io/lightpanda-io/browser:latest
    ports: ["9222:9222"]
    restart: unless-stopped

  # ─── Zep (Graph Memory) ──────────────────────────────────
  zep-server:
    image: getzep/zep:latest
    ports: ["8001:8001"]
    depends_on: [zep-postgres]
    environment:
      - ZEP_DB_URL=postgres://zep:zep@zep-postgres:5432/zep?sslmode=disable
      - ZEP_AUTH_ENABLED=false
    restart: unless-stopped

  zep-postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=zep
      - POSTGRES_USER=zep
      - POSTGRES_PASSWORD=zep
    volumes:
      - zep_data:/var/lib/postgresql/data
    restart: unless-stopped

  # ─── SearXNG (Auto-Collector Search) ──────────────────────
  searxng:
    image: searxng/searxng:latest
    ports: ["8082:8080"]
    volumes:
      - ./searxng:/etc/searxng
    environment:
      - SEARXNG_BASE_URL=http://localhost:8082
    restart: unless-stopped

volumes:
  pgdata:
  qdrant_data:
  minio_data:
  ollama_data:
  zep_data:
